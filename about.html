<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Eastern Veil</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <style>
        .about-main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2xl);
            max-width: 1300px;
            margin: 0 auto;
            padding: calc(var(--space-2xl) + 60px) var(--space-xl) var(--space-xl);
        }

        .about-left {
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
        }

        .about-right {
            display: flex;
            flex-direction: column;
            gap: var(--space-xl);
            padding-top: 5px; /* Perfect visual alignment with the Origin title */
        }

        .about-title {
            font-size: clamp(3rem, 6vw, 6rem);
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
            z-index: 10;
        }

        .globe-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            position: relative;
            z-index: 5;
        }

        .globe-container canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
            border-radius: 50%;
        }

        .globe-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            border-radius: 50%;
            /* Thin, bright white atmosphere aura */
            box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.5), 
                        inset 0 0 30px 10px rgba(255, 255, 255, 0.4);
            z-index: -1;
            pointer-events: none;
        }

        .globe-container canvas:active {
            cursor: grabbing;
        }

        @media (max-width: 900px) {
            .about-main-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .about-left, .about-right {
                align-items: center;
            }
            .about-title {
                border-bottom: 2px solid var(--border-color);
                width: 100%;
                padding-bottom: var(--space-sm);
            }
            .about-right {
                padding-top: 0;
            }
        }

        .about-meta {
            position: sticky;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            height: max-content;
        }

        .meta-group {
            border: 1px solid rgba(74, 144, 226, 0.2);
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.05);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(8px);
        }

        .meta-header {
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid rgba(74, 144, 226, 0.2);
            background: linear-gradient(90deg, rgba(74, 144, 226, 0.05), transparent);
            color: var(--accent-blue);
            font-size: 10px;
            letter-spacing: 0.2em;
        }

        .meta-content {
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border-subtle);
            padding-bottom: 4px;
        }

        .meta-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .about-text {
            display: flex;
            flex-direction: column;
            gap: var(--space-xl);
            font-family: var(--font-display);
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .about-text p:first-child {
            font-size: 1.8rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .team-section {
            padding-top: var(--space-xl);
            border-top: 1px solid var(--border-color);
        }
        
        .team-title {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--accent-red);
            letter-spacing: 0.1em;
            margin-bottom: var(--space-lg);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-md);
        }

        .team-member {
            border: 1px solid rgba(215, 38, 61, 0.15);
            padding: var(--space-md);
            background: var(--bg-surface);
            transition: all 0.2s;
        }
        
        .team-member:hover {
            background: var(--bg-surface-elevated);
            border-color: rgba(215, 38, 61, 0.3);
            box-shadow: inset 0 0 20px rgba(215, 38, 61, 0.05);
        }

        .member-name {
            color: var(--text-primary);
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .member-role {
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .about-grid {
                grid-template-columns: 1fr;
            }
            .about-meta {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <nav-section></nav-section>

    <main>
        <section class="about-main-grid">
            <globe-section></globe-section>

            <div class="about-right">
                <about-parameters></about-parameters>
                <about-description></about-description>
            </div>
        </section>

        <section style="max-width: 1300px; margin: 0 auto; padding: 0 var(--space-xl) var(--space-xl);">
            <about-socials></about-socials>
        </section>
    </main>

    <footer-section></footer-section>

    <!-- Component Modules -->
    <script type="module" src="components/NavSection.js"></script>
    <script type="module" src="components/GlobeSection.js"></script>
    <script type="module" src="components/AboutParameters.js"></script>
    <script type="module" src="components/AboutDescription.js"></script>
    <script type="module" src="components/AboutSocials.js"></script>
    <script type="module" src="components/FooterSection.js"></script>

    <!-- Core Interaction Scripts -->
    <script src="main.js"></script>
    <script src="cursor.js"></script>
</body>
</html>
